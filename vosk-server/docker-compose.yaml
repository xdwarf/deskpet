# =============================================================================
# DeskPet — neo-brain server
# =============================================================================
# Runs the Vosk STT + Gemini AI backend on your Docker host (192.168.2.14).
#
# FIRST-TIME SETUP — download the Danish Vosk model before starting:
#
#   mkdir -p models
#   wget -P models https://alphacephei.com/vosk/models/vosk-model-small-da-0.22.zip
#   unzip models/vosk-model-small-da-0.22.zip -d models/
#   rm models/vosk-model-small-da-0.22.zip
#
# Then copy .env.example → .env and fill in your Gemini API key.
#
# Start:  docker compose up -d
# Logs:   docker compose logs -f
# Test:   curl http://192.168.2.14:8000/health
# =============================================================================

services:
  neo-brain:
    build: .
    container_name: neo-brain
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      # Models directory — mount read-only into the container
      # The Vosk model must be downloaded here before first start (see above)
      - ./models:/models:ro
    env_file:
      - .env
    environment:
      - VOSK_MODEL_PATH=/models/vosk-model-small-da-0.22
      - GEMINI_MODEL=gemini-1.5-flash
      # SYSTEM_PROMPT can be overridden here if you want to tweak Neo's personality
      # without changing the code — just uncomment and edit:
      # - SYSTEM_PROMPT=Du er Neo, en venlig assistent. Svar altid på dansk.
