<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DeskPet Sprite Server</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <header>
    <h1>DeskPet Sprite Server</h1>
    <div id="manifest-badge" class="badge">v—</div>
  </header>

  <main>

    <!-- MP4 to GIF converter -->
    <section class="card" id="mp4-card">
      <h2>Convert MP4 → GIF</h2>
      <p class="hint">Upload an MP4 animation. It will be converted to a 240×240 GIF ready for the sprite publisher.</p>

      <form id="mp4-form">
        <label>
          MP4 File
          <input type="file" id="mp4-input" accept="video/mp4" required />
        </label>
        <label>
          Frame Rate
          <select id="mp4-fps">
            <option value="24">24 fps</option>
            <option value="12" selected>12 fps (recommended)</option>
            <option value="8">8 fps</option>
          </select>
        </label>

        <div class="btn-row">
          <button type="submit" id="btn-convert-mp4">Convert &amp; Download GIF</button>
        </div>
      </form>

      <div id="mp4-result-box" hidden></div>
    </section>

    <!-- Publish form -->
    <section class="card" id="publish-card">
      <h2>Publish Sprite</h2>
      <p class="hint">Upload a GIF (or PNG/JPEG). Each frame becomes one 240×240 RGB565 animation frame.</p>

      <form id="publish-form">
        <label>
          Character
          <input type="text" id="character" placeholder="muni" required />
        </label>
        <label>
          Expression
          <input type="text" id="expression" placeholder="happy" required />
        </label>
        <label>
          Image file
          <input type="file" id="file-input" accept="image/*" required />
        </label>

        <div class="preview-row">
          <img id="preview-img" alt="preview" hidden />
        </div>

        <div class="btn-row">
          <button type="button" id="btn-preview" disabled>Preview</button>
          <button type="button" id="btn-download" hidden>Download .sprite</button>
          <button type="submit" id="btn-publish" disabled>Publish</button>
        </div>
      </form>

      <div id="result-box" hidden></div>
    </section>

    <!-- Published sprites -->
    <section class="card" id="library-card">
      <h2>Published Sprites <button id="btn-refresh" class="small">Refresh</button></h2>
      <div id="library"></div>
    </section>

  </main>

  <script src="/static/app.js"></script>
  <script>
    // MP4 → GIF converter
    document.getElementById('mp4-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const resultBox = document.getElementById('mp4-result-box');
      const btn = document.getElementById('btn-convert-mp4');
      const file = document.getElementById('mp4-input').files[0];
      const fps  = document.getElementById('mp4-fps').value;

      if (!file) return;

      btn.disabled = true;
      btn.textContent = 'Converting…';
      resultBox.hidden = true;

      const fd = new FormData();
      fd.append('file', file);
      fd.append('fps', fps);

      try {
        const res = await fetch('/convert-mp4', { method: 'POST', body: fd });
        if (!res.ok) {
          const err = await res.json();
          throw new Error(err.detail || 'Conversion failed');
        }

        // Trigger download
        const blob = await res.blob();
        const url  = URL.createObjectURL(blob);
        const a    = document.createElement('a');
        const disposition = res.headers.get('content-disposition') || '';
        const nameMatch   = disposition.match(/filename="?([^"]+)"?/);
        a.download = nameMatch ? nameMatch[1] : 'muni.gif';
        a.href = url;
        a.click();
        URL.revokeObjectURL(url);

        resultBox.textContent = '✓ GIF downloaded — ready to publish above!';
        resultBox.className = 'result-box success';
        resultBox.hidden = false;
      } catch (err) {
        resultBox.textContent = '✗ ' + err.message;
        resultBox.className = 'result-box error';
        resultBox.hidden = false;
      } finally {
        btn.disabled = false;
        btn.textContent = 'Convert & Download GIF';
      }
    });
  </script>
</body>
</html>
