server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;

    # Allow directory listing so you can browse sprite sheets during development
    autoindex on;
    autoindex_exact_size off;
    autoindex_localtime on;

    # Cache control — ESP32 checks the manifest on every boot;
    # short max-age keeps devices in sync without hammering the server.
    location /manifest.json {
        add_header Cache-Control "no-cache, must-revalidate";
        add_header Access-Control-Allow-Origin "*";
    }

    # Sprite files: cache for 1 hour (they only change when manifest version bumps)
    location ~* \.(bin|raw|sprite)$ {
        add_header Cache-Control "public, max-age=3600";
        add_header Access-Control-Allow-Origin "*";
    }

    # Everything else
    location / {
        add_header Access-Control-Allow-Origin "*";
        try_files $uri $uri/ =404;
    }
}
