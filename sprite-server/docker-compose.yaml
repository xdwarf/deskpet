services:
  nginx:
    image: nginx:alpine
    container_name: deskpet-nginx
    restart: unless-stopped
    ports:
      - "8765:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./sprites:/usr/share/nginx/html:ro

  api:
    build: ./api
    container_name: deskpet-api
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - ./sprites:/sprites
      - ./gifs:/gifs