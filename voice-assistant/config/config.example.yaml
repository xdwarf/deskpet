# =============================================================================
# DeskPet Voice Assistant — Configuration Template
# =============================================================================
# Copy this file to config.yaml and fill in your own values.
# config.yaml is gitignored — never commit API keys.
# =============================================================================

mqtt:
  broker: "192.168.2.14"
  port: 1883
  client_id: "deskpet-voice"
  username: ""   # Leave empty if your broker has no auth
  password: ""

server:
  # neo-brain server running on the Docker host — handles STT (Vosk) and AI (Gemini)
  # Start it with: cd vosk-server && docker compose up -d
  url: "http://192.168.2.14:8000"
  timeout: 30   # seconds — covers both transcription and AI response time

chromecast:
  # Google Nest speaker IP address (find it in your router's DHCP table or Google Home app)
  host: "192.168.2.172"
  # Chromecast control port — 8009 is the default for all Nest/Chromecast devices
  port: 8009
  # The Pi's own LAN IP — the Nest fetches the audio file from here
  # Run `hostname -I` on the Pi to find this
  serve_host: "192.168.2.X"   # Replace with your Pi's IP
  # Port for the Pi's built-in audio file server (any free port above 1024)
  serve_port: 8765

wake_word:
  # Wake word model to use with openwakeword
  # Options: "hey_neo" (custom, see docs/hardware-notes.md), or a built-in
  # Built-in options include: "hey_jarvis", "hey_mycroft" etc.
  # For "Hey Neo" you will need to train a custom model — see docs.
  model: "hey_jarvis"     # Placeholder until custom model is trained
  threshold: 0.5          # Confidence threshold (0.0-1.0). Lower = more sensitive.

audio:
  # USB microphone device index. Run `python -c "import pyaudio; p=pyaudio.PyAudio(); [print(i, p.get_device_info_by_index(i)['name']) for i in range(p.get_device_count())]"` to list devices.
  mic_device_index: 0
  sample_rate: 16000      # 16 kHz — Vosk expects this on the server
  chunk_size: 512
  record_seconds: 8       # Max recording time after wake word

tts:
  # gTTS language code for Danish — TTS runs on the Pi
  language: "da"
  # Temporary file for TTS audio output before casting
  output_file: "/tmp/neo_response.mp3"

logging:
  level: "INFO"           # DEBUG, INFO, WARNING, ERROR
