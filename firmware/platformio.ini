; DeskPet — PlatformIO Project Configuration
; Target: ESP32-C3 Mini
; Framework: Arduino

[env:esp32-c3-mini]
platform  = espressif32
board     = esp32-c3-devkitm-1
framework = arduino

; Serial monitor baud rate
monitor_speed = 115200

; Upload speed — reduce if you get flashing errors
upload_speed = 921600

; Build flags:
;   ARDUINO_USB_MODE=1        — needed for ESP32-C3 USB serial to work correctly
;   ARDUINO_USB_CDC_ON_BOOT=1 — enables USB CDC serial on boot
;   USER_SETUP_LOADED=1       — tells TFT_eSPI to skip its own User_Setup.h and
;                               use our include/User_Setup.h instead
;   -I include                — exposes include/ to ALL compilation units including
;                               TFT_eSPI library, so it can find our User_Setup.h
;                               and resolve GC9A01_DRIVER + pin defines correctly
;                               (build_src_flags only covers src/, not libraries)
build_flags =
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1
    ; LovyanGFX does not use User_Setup.h — all display config lives in
    ; include/lgfx_config.h which is included by src/display.h.
    ; The -I include flag is no longer needed for library config injection.

; Partition scheme — needed to fit LittleFS alongside the app.
; "min_spiffs" gives 1.9 MB app + 190 KB SPIFFS/LittleFS on a 4 MB flash.
; Use "huge_app" if sprite files are large, but that leaves only ~64 KB FS.
board_build.partitions = min_spiffs.csv

; Filesystem type — LittleFS is more wear-resistant than SPIFFS on flash
board_build.filesystem = littlefs

; Libraries pulled from the PlatformIO registry
lib_deps =
    ; LovyanGFX — display driver with first-class ESP32-C3 SPI support.
    ; Unlike TFT_eSPI, it initialises SPI2 via spi_bus_initialize() from
    ; ESP-IDF directly (no Arduino SPIClass wrapper), which avoids the
    ; TG1WDT_SYS_RST crash that TFT_eSPI triggers on ESP32-C3 SuperMini.
    lovyan03/LovyanGFX @ ^1.1.16
    ; PubSubClient — lightweight MQTT client
    knolleary/PubSubClient @ ^2.8
    ; ArduinoJson — for parsing manifest.json and structured MQTT payloads
    bblanchon/ArduinoJson @ ^7.0.4
